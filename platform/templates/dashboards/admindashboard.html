{% extends "base.html" %}

{% block title %}Admin Dashboard - TnT{% endblock %}

{% block content %}
<div class="card-custom">
    <h1>Admin Dashboard</h1>

    <p>Welcome, {{ current_user.fullName }}!</p>

    <h2>Admin Controls</h2>

    <h3>Create Stock</h3>
    <form method="POST" action="{{ url_for('admin_dashboard') }}" class="mt-3">
        <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" name="company_name" class="form-control" placeholder="Enter company name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Ticker</label>
            <input type="text" name="ticker" class="form-control" maxlength="4" placeholder="Enter ticker (max 4 characters)" required> 
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" class="form-control" placeholder="Enter quantity" min="0" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Initial Stock Price</label>
            <input type="number" name="initial_price" class="form-control" min="0" step="0.01" placeholder="Enter initial stock price" required>
        </div>

        <button type="submit" class="btn btn-primary">Create Stock</button>
    </form>
</div>
{% endblock %}
