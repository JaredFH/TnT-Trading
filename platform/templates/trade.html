{% extends "base.html" %}

{% block title %}Trade - TnT{% endblock %}

{% block content %}
<div class="card-custom">
    <h2>Trade Center</h2>

    {% if market_open %}
        <div class="alert alert-success mt-3">
            {{ market_message }}
        </div>
    {% else %}
        <div class="alert alert-danger mt-3">
            {{ market_message }}
        </div>
    {% endif %} 
    
    <form class="mt-3" method="POST" action="{{ url_for('trade') }}" id="tradeForm">
    
        <div class="mb-3">
            <label class="form-label">Select Stock</label>
            <select class="form-control" name="stock_id" id="stockSelect">
                {% for stock in stocks %}

                    <option 
                        value="{{ stock.stockId }}"
                        data-name="{{ stock.name }}"
                        data-ticker="{{ stock.ticker }}"
                        data-price="{{ stock.currentMarketPrice }}"
                    >
                        {{ stock.ticker }} - ${{ stock.currentMarketPrice }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" id="quantityInput" class="form-control" placeholder="Enter quantity" min="1" required>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" name="action" value="buy" class="btn btn-success">Buy</button>
            <button type="submit" name="action" value="sell" class="btn btn-danger">Sell</button>
        </div>
    </form>
</div>

<!-- Trade Confirmation Modal -->
<div class="modal fade" id="tradeConfirmModal" tabindex="-1" aria-labelledby="tradeConfirmModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content card-custom" style="max-width: none; margin: 0;">
      <div class="modal-header" style="border-bottom: 1px solid #3a3a3a;">
        <h5 class="modal-title" id="tradeConfirmModalLabel" style="color: #fcbf49;">Confirm Trade</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p id="tradeConfirmMessage" style="color: #f5f5f5; font-size: 1.1rem;"></p>
      </div>
      <div class="modal-footer" style="border-top: 1px solid #3a3a3a;">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" id="tradeConfirmSubmitBtn">Confirm</button>
      </div>
    </div>
  </div>
</div>

<script>
let pendingAction = null;
let tradeModal = null;

document.getElementById("tradeForm").addEventListener("submit", function(event) {
    if (pendingAction === 'confirmed') {
        return;
    }

    event.preventDefault();

    const selectedOption = document.getElementById("stockSelect").selectedOptions[0];
    const quantity = document.getElementById("quantityInput").value;
    const action = event.submitter.value;

    pendingAction = action;

    const companyName = selectedOption.dataset.name;
    const ticker = selectedOption.dataset.ticker;
    const price = parseFloat(selectedOption.dataset.price);
    const totalPrice = (quantity * price).toFixed(2);

    let message = ""

    if (action == "buy") {
        message = `Would you like to buy ${quantity} share(s) of ${companyName} (${ticker}) for $${totalPrice}?`;
        document.getElementById("tradeConfirmSubmitBtn").className = "btn btn-success";
        document.getElementById("tradeConfirmSubmitBtn").innerText = "Confirm Buy";
    } else {
        message = `Would you like to sell ${quantity} share(s) of ${companyName} (${ticker}) for $${totalPrice}?`;
        document.getElementById("tradeConfirmSubmitBtn").className = "btn btn-danger";
        document.getElementById("tradeConfirmSubmitBtn").innerText = "Confirm Sell";
    }

    document.getElementById("tradeConfirmMessage").innerText = message;
    
    if (!tradeModal) {
        tradeModal = new bootstrap.Modal(document.getElementById('tradeConfirmModal'));
    }
    tradeModal.show();
});

document.getElementById("tradeConfirmSubmitBtn").addEventListener("click", function() {
    const form = document.getElementById("tradeForm");
    
    const actionInput = document.createElement("input");
    actionInput.type = "hidden";
    actionInput.name = "action";
    actionInput.value = pendingAction;
    form.appendChild(actionInput);

    pendingAction = 'confirmed';
    form.submit();
});
</script>

<script>
setInterval(function () {
    location.reload();
}, 30000);
</script>
{% endblock %}
