{% extends "base.html" %}

{% block title %}Trade - TnT{% endblock %}

{% block content %}
<div class="card-custom">
    <h2>Trade Center</h2>

    <form class="mt-3" method="POST" action="{{ url_for('trade') }}">
        <div class="mb-3">
            <label class="form-label">Select Stock</label>
            <select class="form-control" name="stock_id">
                {% for stock in stocks %}

                    <option value="{{ stock.stockId }}">
                        {{ stock.ticker }} - ${{ stock.currentMarketPrice }}
                    </option>
                {% endfor %}

            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Quantity</label>
            <input type="number" name="quantity" class="form-control" placeholder="Enter quantity" min="1" required>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" name="action" value="buy" class="btn btn-success">Buy</button>
            <button type="submit" name="action" value="sell" class="btn btn-danger">Sell</button>
        </div>
    </form>
</div>
{% endblock %}
