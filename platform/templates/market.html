{% extends "base.html" %}

{% block title %}Market - TnT{% endblock %}

{% block content %}
<div class="card-custom">
    <h2>Market Overview</h2>

    <table class="table table-dark table-striped mt-3">
        <thead>
            <tr>
                <th>Stock Name</th>
                <th>Ticker</th>
                <th>Quantity</th>
                <th>Current Price</th>
            </tr>
        </thead>
        <tbody>
            {% for stock in stocks %}
            <tr>
                <td>{{ stock.name }}</td>
                <td>{{ stock.ticker }}</td>
                <td>{{ stock.quantity }}</td>
                <td>${{ stock.currentMarketPrice }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
